<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Page Not Found | AHMEDTECH DZ-IPTV</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        
        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }
        
        body {
            min-height: 100vh;
            background: url('https://images.unsplash.com/photo-1501854140801-50d01698950b?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') no-repeat center center fixed;
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            background-repeat: no-repeat;
            color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            position: relative;
        }
        
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 0;
        }
        
        .error-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 90vh;
            text-align: center;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .error-code {
            font-size: 8rem;
            font-weight: 700;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .error-title {
            font-size: 2.5rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.95);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        
        .error-message {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 600px;
        }
        
        .back-home {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.95);
            padding: 15px 35px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            letter-spacing: 0.5px;
        }
        
        .back-home:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }
        
        .security-badge {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(100, 255, 100, 0.1);
            border: 1px solid rgba(100, 255, 100, 0.3);
            color: rgba(200, 255, 200, 0.95);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 100;
        }
        
        .version-badge {
            background: rgba(100, 150, 255, 0.2);
            color: rgba(200, 220, 255, 0.95);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 0.7rem;
            margin-left: 8px;
        }
        
        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            padding: 0 20px;
        }
        
        @media (max-width: 768px) {
            .error-code {
                font-size: 6rem;
            }
            
            .error-title {
                font-size: 2rem;
            }
            
            .error-message {
                font-size: 1rem;
                padding: 0 15px;
            }
            
            .back-home {
                padding: 12px 25px;
                font-size: 0.9rem;
            }
            
            .security-badge {
                top: 15px;
                left: 15px;
                font-size: 0.7rem;
                padding: 4px 12px;
            }
        }
        
        @media (max-width: 480px) {
            .error-code {
                font-size: 5rem;
            }
            
            .error-title {
                font-size: 1.7rem;
            }
            
            body {
                padding: 15px;
            }
            
            .footer {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="security-badge">
        <i class="fas fa-shield-alt"></i> AHMEDTECH Secure <span class="version-badge">v1.2.0</span>
    </div>
    
    <div class="error-container">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            The page you're looking for doesn't exist or has been moved to another location. 
            This could be due to a typo in the URL or the page may have been deleted.
        </p>
        <a href="/" class="back-home">
            <i class="fas fa-home"></i> Back to Homepage
        </a>
        
        <div class="footer">
            <p>© 2026 AHMEDTECH DZ-IPTV. All rights reserved. | BY AHMED - DZ | Version 1.2.0</p>
        </div>
    </div>
    
    <script>
        // تحويل مؤقت إلى الصفحة الرئيسية بعد 30 ثانية
        setTimeout(() => {
            window.location.href = "/";
        }, 30000);
        
        // تحديث التاريخ والوقت
        function updateDateTime() {
            const date = new Date();
            const options = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            const timeString = date.toLocaleTimeString('en-US', { 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: true 
            });
            
            // يمكن إضافة التاريخ والوقت إذا أردت
            // document.getElementById('currentDateTime').textContent = 
            //     `${date.toLocaleDateString('en-US', options)} | ${timeString}`;
        }
        
        // تحديث كل دقيقة
        updateDateTime();
        setInterval(updateDateTime, 60000);
        
        // تسجيل الحدث
        console.log('🔍 404 Page Accessed:', {
            timestamp: new Date().toISOString(),
            path: window.location.pathname,
            referrer: document.referrer || 'Direct',
            userAgent: navigator.userAgent.substring(0, 100)
        });
    </script>
</body>
</html>
